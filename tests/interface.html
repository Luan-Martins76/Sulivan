<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lionel no IT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #080c10;
            --surface:     #0d1117;
            --sidebar:     #0a0e14;
            --border:      #1c2330;
            --accent:      #00ffa3;
            --accent2:     #00c8ff;
            --text:        #cdd6e0;
            --muted:       #4a5568;
            --user-bg:     #0f2a3d;
            --user-border: #1a4a6b;
            --bot-bg:      #0d1117;
            --bot-border:  #1c2330;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background-image:
                linear-gradient(rgba(0,255,163,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,163,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── WRAPPER (sidebar + chat) ── */
        .wrapper {
            width: 100%;
            max-width: 900px;
            height: 92vh;
            max-height: 820px;
            display: flex;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0,255,163,0.04), 0 24px 80px rgba(0,0,0,0.7);
            animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ══════════════════════════════
           SIDEBAR
        ══════════════════════════════ */
        .sidebar {
            width: 240px;
            min-width: 240px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.25s ease, min-width 0.25s ease;
        }

        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            border-right: none;
        }

        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        .new-chat-btn {
            width: 26px; height: 26px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--accent);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .new-chat-btn:hover { background: rgba(0,255,163,0.08); }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .history-list::-webkit-scrollbar { width: 3px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .history-section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--muted);
            padding: 8px 8px 4px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        .history-item {
            padding: 9px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.12s;
            margin-bottom: 2px;
            border: 1px solid transparent;
            white-space: nowrap;
            overflow: hidden;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.04);
            border-color: var(--border);
        }

        .history-item.active {
            background: rgba(0,255,163,0.07);
            border-color: rgba(0,255,163,0.2);
        }

        .history-item-title {
            font-size: 0.8rem;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item.active .history-item-title { color: var(--accent); }

        .history-item-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .history-empty {
            padding: 20px 10px;
            text-align: center;
            font-size: 0.78rem;
            color: var(--muted);
            line-height: 1.6;
        }

        /* ══════════════════════════════
           CHAT PANEL
        ══════════════════════════════ */
        .chat-panel {
            flex: 1;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* ── HEADER ── */
        .header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,255,163,0.015);
            flex-shrink: 0;
        }

        .toggle-sidebar-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: color 0.15s, background 0.15s;
            flex-shrink: 0;
        }
        .toggle-sidebar-btn:hover { color: var(--accent); background: rgba(0,255,163,0.06); }

        .avatar-wrap { position: relative; }

        .avatar {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, #001a0f, #003320);
            border: 1px solid rgba(0,255,163,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        .online-dot {
            position: absolute;
            bottom: -2px; right: -2px;
            width: 9px; height: 9px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid var(--surface);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(0,255,163,0.5); }
            50%      { box-shadow: 0 0 0 5px rgba(0,255,163,0); }
        }

        .header-info { flex: 1; min-width: 0; }

        .header-info h1 {
            font-size: 0.92rem;
            font-weight: 600;
            color: #e8edf2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--accent);
            margin-top: 2px;
            opacity: 0.8;
        }

        .header-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.63rem;
            color: var(--muted);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 7px;
            white-space: nowrap;
        }

        /* ── CHATBOX ── */
        #chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        #chatbox::-webkit-scrollbar { width: 4px; }
        #chatbox::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .separator {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            margin: 4px 0;
        }

        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: msgIn 0.22s cubic-bezier(0.16,1,0.3,1);
        }

        .message-row.user { flex-direction: row-reverse; }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 26px; height: 26px;
            border-radius: 7px;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            margin-bottom: 18px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            font-size: 0.875rem;
            line-height: 1.6;
            color: var(--text);
        }

        .bot-message {
            background: var(--bot-bg);
            border: 1px solid var(--bot-border);
            border-radius: 14px 14px 14px 4px;
        }

        .user-message {
            background: var(--user-bg);
            border: 1px solid var(--user-border);
            border-radius: 14px 14px 4px 14px;
            color: #a8d8f0;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        .message-row.user .msg-meta { justify-content: flex-end; }

        .msg-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--muted);
        }

        .source-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.58rem;
            padding: 1px 5px;
            border-radius: 4px;
            background: rgba(0,255,163,0.08);
            color: var(--accent);
            border: 1px solid rgba(0,255,163,0.15);
        }

        /* ── TYPING ── */
        .typing-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: msgIn 0.2s ease;
        }

        .typing-bubble {
            background: var(--bot-bg);
            border: 1px solid var(--bot-border);
            border-radius: 14px 14px 14px 4px;
            padding: 12px 16px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-bubble span {
            width: 6px; height: 6px;
            background: var(--muted);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%,60%,100% { transform: translateY(0); opacity: 0.4; }
            30%          { transform: translateY(-5px); opacity: 1; }
        }

        /* ── INPUT ── */
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(0,0,0,0.25);
            flex-shrink: 0;
        }

        #userInput {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        #userInput:focus {
            border-color: rgba(0,255,163,0.4);
            box-shadow: 0 0 0 3px rgba(0,255,163,0.06);
        }

        #userInput::placeholder { color: var(--muted); }

        #sendBtn {
            width: 42px; height: 42px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #080c10;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.15s, transform 0.1s;
            flex-shrink: 0;
        }

        #sendBtn:hover  { opacity: 0.85; transform: scale(1.06); }
        #sendBtn:active { transform: scale(0.95); }
        #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        /* ── RESPONSIVE: esconde sidebar em telas pequenas ── */
        @media (max-width: 560px) {
            .sidebar { display: none; }
            .wrapper { max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <!-- ════════ SIDEBAR ════════ -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Histórico</span>
            <button class="new-chat-btn" onclick="newChat()" title="Nova conversa">+</button>
        </div>
        <div class="history-list" id="historyList">
            <!-- Preenchido pelo JS -->
        </div>
    </div>

    <!-- ════════ CHAT PANEL ════════ -->
    <div class="chat-panel">

        <div class="header">
            <button class="toggle-sidebar-btn" onclick="toggleSidebar()" title="Alternar histórico">☰</button>
            <div class="avatar-wrap">
                <div class="avatar">🤖</div>
                <div class="online-dot"></div>
            </div>
            <div class="header-info">
                <h1 id="chatTitle">Nova conversa</h1>
                <div class="header-sub">● sistema ativo</div>
            </div>
            <div class="header-badge">v1.0 · ABP</div>
        </div>

        <div id="chatbox">
            <div class="separator">hoje</div>
            <div class="message-row">
                <div class="msg-avatar">🤖</div>
                <div>
                    <div class="message bot-message">Olá! Como posso ajudar hoje? Tente me perguntar sobre um dia da semana 👀</div>
                    <div class="msg-meta">
                        <span class="msg-time" id="init-time"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()" title="Enviar">↑</button>
        </div>

    </div>
</div>

<script>
    // ════════════════════════════════════════
    // ESTADO
    // ════════════════════════════════════════

    // Cada sessão: { id, title, date, messages: [{who, text, source, time}] }
    // 
    // ⚠️  PONTO DE INTEGRAÇÃO COM O BACKEND:
    //     Substitua loadHistory() e saveSession() por chamadas reais à sua API
    //     quando tiver o backend pronto. Ex:
    //       GET  /historico        → lista de sessões
    //       GET  /historico/:id    → mensagens de uma sessão
    //       POST /historico        → salvar sessão

    let sessions  = [];   // lista de sessões carregadas do backend
    let activeId  = null; // id da sessão ativa

    // ── Inicialização ──────────────────────
    document.getElementById('init-time').textContent = now();
    loadHistory();

    // ════════════════════════════════════════
    // HISTÓRICO — substitua estas funções pelo fetch real
    // ════════════════════════════════════════

    async function loadHistory() {
        /* TODO (backend):
            const res = await fetch('/historico');
            sessions = await res.json();
        */

        // Por enquanto: dados de exemplo para você ver o visual
        sessions = [
            {
                id: 'exemplo-1',
                title: 'Aula de quarta-feira',
                date: '06/03/2025',
                messages: [
                    { who: 'user', text: 'o que tem na quarta?', time: '19:02' },
                    { who: 'bot',  text: 'Tem uma aula do balacobaco de INTRODUÇÃO À ENGENHARIA DE SOLUÇÕES com o professor HENRIQUE LIMA. Começa às 19:00 e termina às 22:40. Local é BLOCO H, SALA 110 📚', source: 'regras', time: '19:02' }
                ]
            },
            {
                id: 'exemplo-2',
                title: 'Teste do sistema',
                date: '05/03/2025',
                messages: [
                    { who: 'user', text: 'qual o seu nome?', time: '20:15' },
                    { who: 'bot',  text: 'Meu nome é Lionel No IT 😉', source: 'regras', time: '20:15' }
                ]
            }
        ];

        renderSidebar();
    }

    async function saveCurrentSession(messages) {
        if (!activeId || messages.length === 0) return;

        const firstUserMsg = messages.find(m => m.who === 'user');
        const title = firstUserMsg
            ? firstUserMsg.text.slice(0, 30) + (firstUserMsg.text.length > 30 ? '…' : '')
            : 'Conversa';

        const today = new Date().toLocaleDateString('pt-BR');
        const existing = sessions.findIndex(s => s.id === activeId);

        const session = { id: activeId, title, date: today, messages };

        if (existing >= 0) sessions[existing] = session;
        else sessions.unshift(session);

        /* TODO (backend):
            await fetch('/historico', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(session)
            });
        */

        renderSidebar();
    }

    // ════════════════════════════════════════
    // SIDEBAR
    // ════════════════════════════════════════

    function renderSidebar() {
        const list = document.getElementById('historyList');

        if (sessions.length === 0) {
            list.innerHTML = `<div class="history-empty">Nenhuma conversa ainda.<br>Manda uma mensagem! 👀</div>`;
            return;
        }

        // Agrupa por data
        const groups = {};
        sessions.forEach(s => {
            const key = s.date || 'Sem data';
            if (!groups[key]) groups[key] = [];
            groups[key].push(s);
        });

        list.innerHTML = '';
        Object.entries(groups).forEach(([date, items]) => {
            const label = document.createElement('div');
            label.className = 'history-section-label';
            label.textContent = date;
            list.appendChild(label);

            items.forEach(s => {
                const item = document.createElement('div');
                item.className = 'history-item' + (s.id === activeId ? ' active' : '');
                item.innerHTML = `
                    <div class="history-item-title">${escHtml(s.title)}</div>
                    <div class="history-item-meta">${s.messages.length} mensagens</div>
                `;
                item.onclick = () => openSession(s.id);
                list.appendChild(item);
            });
        });
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    // ════════════════════════════════════════
    // SESSÕES
    // ════════════════════════════════════════

    // mensagens da sessão atual (em memória)
    let currentMessages = [];

    function newChat() {
        activeId = 'sess-' + Date.now();
        currentMessages = [];

        const chatbox = document.getElementById('chatbox');
        chatbox.innerHTML = `
            <div class="separator">hoje</div>
            <div class="message-row">
                <div class="msg-avatar">🤖</div>
                <div>
                    <div class="message bot-message">Olá! Como posso ajudar hoje? 👀</div>
                    <div class="msg-meta"><span class="msg-time">${now()}</span></div>
                </div>
            </div>
        `;

        document.getElementById('chatTitle').textContent = 'Nova conversa';
        document.getElementById('userInput').focus();
        renderSidebar();
    }

    function openSession(id) {
        const session = sessions.find(s => s.id === id);
        if (!session) return;

        activeId = id;
        currentMessages = [...session.messages];

        const chatbox = document.getElementById('chatbox');
        chatbox.innerHTML = `<div class="separator">${session.date}</div>`;

        session.messages.forEach(m => {
            renderMessage(m.who, m.text, m.source, m.time);
        });

        document.getElementById('chatTitle').textContent = session.title;
        chatbox.scrollTop = chatbox.scrollHeight;
        renderSidebar();
    }

    // ════════════════════════════════════════
    // ENVIO DE MENSAGEM
    // ════════════════════════════════════════

    async function sendMessage() {
        const userInput = document.getElementById('userInput');
        const chatbox   = document.getElementById('chatbox');
        const sendBtn   = document.getElementById('sendBtn');
        const text      = userInput.value.trim();
        if (!text) return;

        // Garante que há uma sessão ativa
        if (!activeId) activeId = 'sess-' + Date.now();

        const userTime = now();
        renderMessage('user', text, null, userTime);
        currentMessages.push({ who: 'user', text, time: userTime });

        userInput.value = '';
        sendBtn.disabled = true;

        // Typing indicator
        const typingRow = document.createElement('div');
        typingRow.classList.add('typing-row');
        typingRow.id = 'typing';
        typingRow.innerHTML = `
            <div class="msg-avatar">🤖</div>
            <div class="typing-bubble"><span></span><span></span><span></span></div>
        `;
        chatbox.appendChild(typingRow);
        chatbox.scrollTop = chatbox.scrollHeight;

        try {
            const res  = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensagem: text })
            });

            let data = {};
            try {
                data = await res.json();
                console.log("Resposta do servidor:", data)
            } catch {
                data = {};
            }

            document.getElementById('typing')?.remove();

            const respostaSegura = (typeof data.response.resposta === 'string' && data.response.resposta.trim())
                ? data.response.resposta
                : (typeof data.erro === 'string' && data.erro.trim())
                    ? `⚠️ ${data.erro}`
                    : '⚠️ Não consegui entender a resposta do servidor.';

            const sourceSegura = typeof data.source === 'string' ? data.source : null;

            const botTime = now();
            renderMessage('bot', respostaSegura, sourceSegura, botTime);
            currentMessages.push({ who: 'bot', text: respostaSegura, source: sourceSegura, time: botTime });

            // Salva no histórico
            await saveCurrentSession(currentMessages);

        } catch {
            document.getElementById('typing')?.remove();
            renderMessage('bot', '⚠️ Servidor offline. Certifique-se que o app.py está rodando.', null, now());
        }

        sendBtn.disabled = false;
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    // ════════════════════════════════════════
    // RENDER
    // ════════════════════════════════════════

    function renderMessage(who, text, source, time) {
        const chatbox  = document.getElementById('chatbox');
        const row      = document.createElement('div');
        row.classList.add('message-row');
        if (who === 'user') row.classList.add('user');

        const icon     = who === 'user' ? '🧑' : '🤖';
        const msgClass = who === 'user' ? 'user-message' : 'bot-message';
        const badge    = (source && source !== 'regras' && source !== 'fallback')
            ? `<span class="source-tag">${source}</span>` : '';

        row.innerHTML = `
            <div class="msg-avatar">${icon}</div>
            <div>
                <div class="message ${msgClass}">${text}</div>
                <div class="msg-meta">
                    ${badge}
                    <span class="msg-time">${time || now()}</span>
                </div>
            </div>
        `;
        chatbox.appendChild(row);
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    function now() {
        return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function escHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    document.getElementById('userInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
    });
</script>

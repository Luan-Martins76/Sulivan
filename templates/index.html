<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sulivan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        .container { display: flex; min-height: 100vh; position: relative; }

        /* ─── SIDEBAR PRINCIPAL ─── */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #1e3c72 0%, #2a4a7a 100%);
            color: white;
            padding: 25px 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
            min-height: 100vh;
        }

        .sidebar-header {
            text-align: center;
            padding-bottom: 25px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            margin-bottom: 25px;
        }
        .sidebar-header h2 { font-size: 24px; font-weight: 600; letter-spacing: 1px; }
        .sidebar-header p  { font-size: 14px; opacity: 0.8; margin-top: 5px; }

        .sidebar nav ul { list-style: none; }
        .sidebar nav ul li { margin-bottom: 8px; }
        .sidebar nav ul li a {
            color: white; text-decoration: none;
            display: flex; align-items: center;
            padding: 12px 15px; border-radius: 10px;
            transition: all 0.3s; font-size: 16px;
        }
        .sidebar nav ul li a:hover  { background-color: rgba(255,255,255,0.15); transform: translateX(5px); }
        .sidebar nav ul li a.active { background-color: rgba(255,255,255,0.25); }
        .sidebar nav ul li a i      { margin-right: 12px; font-size: 20px; width: 24px; text-align: center; }

        .menu-divider { height: 1px; background-color: rgba(255,255,255,0.2); margin: 20px 0; }

        /* ─── CONTEÚDO PRINCIPAL ─── */
        .main-content h1 { color: #1e3c72; margin-bottom: 25px; font-size: 32px; }

        /* ─── VIEWS ─── */
        #view-home, #view-chat { display: none; }
        #view-home.active, #view-chat.active { display: block; }

        /* ─── CHAT PAGE ─── */
        .chat-page {
            display: flex;
            height: calc(100vh - 60px);
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
            overflow: hidden;
        }

        /* ─── SIDEBAR DE HISTÓRICO ─── */
        .chat-sidebar {
            width: 260px;
            background: #f7f9fc;
            border-right: 1px solid #e0e6ef;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width 0.3s, padding 0.3s;
            overflow: hidden;
        }
        .chat-sidebar.collapsed { width: 0; }

        .chat-sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e0e6ef;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }
        .chat-sidebar-header span { font-weight: 600; color: #1e3c72; font-size: 15px; flex: 1; }

        .btn-new-chat {
            background: linear-gradient(135deg, #1e3c72, #2a4a7a);
            color: white; border: none;
            padding: 7px 14px; border-radius: 20px;
            font-size: 13px; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .btn-new-chat:hover { transform: scale(1.05); }

        #historyList { flex: 1; overflow-y: auto; padding: 8px 0; }
        #historyList::-webkit-scrollbar { width: 5px; }
        #historyList::-webkit-scrollbar-thumb { background: #c0c8d8; border-radius: 10px; }

        .history-section-label {
            padding: 8px 16px 4px;
            font-size: 11px; font-weight: 700;
            color: #999; text-transform: uppercase; letter-spacing: 0.8px;
        }
        .history-item {
            padding: 10px 16px; cursor: pointer;
            border-radius: 8px; margin: 2px 8px; transition: background 0.2s;
        }
        .history-item:hover  { background: #e8eef7; }
        .history-item.active { background: #dde6f5; }
        .history-item-title  { font-size: 14px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item-meta   { font-size: 12px; color: #999; margin-top: 2px; }
        .history-empty { padding: 24px 16px; font-size: 14px; color: #aaa; text-align: center; line-height: 1.8; }

        /* ─── MAIN DO CHAT ─── */
        .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        .chat-header {
            background: linear-gradient(135deg, #1e3c72, #2a4a7a);
            color: white; padding: 14px 20px;
            display: flex; align-items: center; gap: 12px;
        }
        .btn-toggle-sidebar {
            background: rgba(255,255,255,0.15); border: none; color: white;
            width: 34px; height: 34px; border-radius: 8px; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; flex-shrink: 0;
        }
        .btn-toggle-sidebar:hover { background: rgba(255,255,255,0.25); }
        .chat-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .chat-header-info { flex: 1; min-width: 0; }
        .chat-header-info h3  { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-header-info span { font-size: 12px; opacity: 0.75; }

        /* ─── MENSAGENS ─── */
        #chatbox {
            flex: 1; overflow-y: auto;
            padding: 20px; display: flex;
            flex-direction: column; gap: 12px;
            background: #f7f9fc;
        }
        #chatbox::-webkit-scrollbar { width: 6px; }
        #chatbox::-webkit-scrollbar-thumb { background: #c0c8d8; border-radius: 10px; }

        .separator {
            text-align: center; font-size: 12px; color: #aaa; margin: 8px 0; position: relative;
        }
        .separator::before, .separator::after {
            content: ''; position: absolute; top: 50%; width: 38%; height: 1px; background: #e0e6ef;
        }
        .separator::before { left: 0; }
        .separator::after  { right: 0; }

        .message-row {
            display: flex; align-items: flex-end; gap: 10px;
            animation: msgIn 0.2s ease;
        }
        .message-row.user { flex-direction: row-reverse; }
        @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        .msg-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: #dde6f5; display: flex; align-items: center;
            justify-content: center; font-size: 16px; flex-shrink: 0;
        }
        .message {
            max-width: 65%; padding: 11px 15px; border-radius: 18px;
            font-size: 15px; line-height: 1.5; word-break: break-word;
        }
        .bot-message  { background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        .user-message { background: linear-gradient(135deg, #1e3c72, #2a4a7a); color: white; border-bottom-right-radius: 4px; }

        /* ─── MARKDOWN RENDERIZADO NAS RESPOSTAS DO BOT ─── */
        .bot-message h1, .bot-message h2, .bot-message h3 { margin: 8px 0 4px; color: #1e3c72; }
        .bot-message p  { margin-bottom: 8px; }
        .bot-message p:last-child { margin-bottom: 0; }
        .bot-message ul, .bot-message ol { padding-left: 20px; margin-bottom: 8px; }
        .bot-message li { margin-bottom: 4px; }
        .bot-message code {
            background: #f0f2f5; padding: 2px 6px;
            border-radius: 4px; font-size: 13px; font-family: monospace;
        }
        .bot-message pre {
            background: #f0f2f5; padding: 10px;
            border-radius: 8px; overflow-x: auto;
            font-size: 13px; margin-bottom: 8px;
        }
        .bot-message pre code { background: none; padding: 0; }
        .bot-message strong { color: #1e3c72; }
        .bot-message a { color: #1e3c72; text-decoration: underline; }

        .msg-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .message-row.user .msg-meta { flex-direction: row-reverse; }
        .msg-time   { font-size: 11px; color: #bbb; }
        .source-tag { font-size: 11px; background: #e8eef7; color: #1e3c72; padding: 1px 7px; border-radius: 10px; font-weight: 600; }

        /* ─── TYPING ─── */
        .typing-row { display: flex; align-items: flex-end; gap: 10px; }
        .typing-bubble {
            display: flex; align-items: center; gap: 5px;
            padding: 12px 16px; background: white;
            border-radius: 18px; border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }
        .typing-bubble span { width: 8px; height: 8px; background: #aab4c8; border-radius: 50%; animation: bounce 1.2s infinite; }
        .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }

        /* ─── INPUT ─── */
        .chat-input-area {
            padding: 14px 18px; background: white;
            border-top: 1px solid #e8ecf2;
            display: flex; align-items: center; gap: 10px;
        }
        #userInput {
            flex: 1; border: 2px solid #e0e6ef; border-radius: 50px;
            padding: 11px 18px; font-size: 15px; outline: none;
            font-family: inherit; transition: border-color 0.3s; background: #f7f9fc;
        }
        #userInput:focus { border-color: #1e3c72; background: white; }
        #sendBtn {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, #1e3c72, #2a4a7a);
            border: none; cursor: pointer; color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 19px; transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(30,60,114,0.3); flex-shrink: 0;
        }
        #sendBtn:hover    { transform: scale(1.1); box-shadow: 0 6px 15px rgba(30,60,114,0.4); }
        #sendBtn:active   { transform: scale(0.95); }
        #sendBtn:disabled { opacity: 0.5; cursor: default; transform: none; }

        /* ─── RESPONSIVO ─── */
        @media (max-width: 1024px) {
            .sidebar { width: 240px; }
            .main-content { margin-left: 240px; }
        }
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 15px; }
            .main-content { margin-left: 0; padding: 15px; }
            .chat-page { height: calc(100vh - 80px); }
            .chat-sidebar { width: 200px; }
            .message { max-width: 80%; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ─── SIDEBAR PRINCIPAL ─── -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>📊 Sulivan</h2>
            <p>Painel de Controle</p>
        </div>
        <nav>
            <ul>
                <li><a href="#" onclick="showView('home',this);return false;"><i>🏠</i> Início</a></li>
                <li><a href="#"><i>📅</i> Calendário</a></li>
                <li><a href="#"><i>📝</i> Tarefas</a></li>
                <li><a href="#" onclick="showView('chat',this);return false;"><i>🤖</i> Chat</a></li>
                <div class="menu-divider"></div>
                <li><a href="#"><i>⚙️</i> Configurações</a></li>
                <li><a href="#"><i>👤</i> Perfil</a></li>
                <li><a href="#"><i>📤</i> Sair</a></li>
            </ul>
        </nav>
    </aside>

    <!-- ─── CONTEÚDO PRINCIPAL ─── -->
    <main class="main-content">

        <!-- VIEW: Início -->
        <div id="view-home" class="active">
            <h1>Bem-vindo ao Sulivan</h1>
        </div>

        <!-- VIEW: Chat -->
        <div id="view-chat">
            <div class="chat-page">

                <!-- Sidebar de histórico -->
                <div class="chat-sidebar" id="chatSidebar">
                    <div class="chat-sidebar-header">
                        <span>💬 Histórico</span>
                        <button class="btn-new-chat" onclick="newChat()">+ Novo</button>
                    </div>
                    <div id="historyList"></div>
                </div>

                <!-- Área principal do chat -->
                <div class="chat-main">
                    <div class="chat-header">
                        <button class="btn-toggle-sidebar" onclick="toggleSidebar()" title="Histórico">☰</button>
                        <div class="chat-avatar">🤖</div>
                        <div class="chat-header-info">
                            <h3 id="chatTitle">Nova conversa</h3>
                            <span id="init-time"></span>
                        </div>
                    </div>

                    <div id="chatbox"></div>

                    <div class="chat-input-area">
                        <input type="text" id="userInput" placeholder="Digite sua mensagem..." />
                        <button id="sendBtn" onclick="sendMessage()">➤</button>
                    </div>
                </div>

            </div>
        </div>

    </main>
</div>

<script>
    // ════════════════════════════════════════
    // ESTADO
    // ════════════════════════════════════════
    let sessions        = [];
    let activeId        = null;
    let currentMessages = [];

    document.getElementById('init-time').textContent = now();
    loadHistory();

    // ════════════════════════════════════════
    // TROCA DE VIEW
    // ════════════════════════════════════════
    function showView(view, linkEl) {
        document.querySelectorAll('.main-content > div').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active');
        document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
        if (linkEl) linkEl.classList.add('active');
        if (view === 'chat' && !activeId) newChat();
    }

    // ════════════════════════════════════════
    // HISTÓRICO — substitua por fetch real quando tiver backend
    // ════════════════════════════════════════
    async function loadHistory() {
        /* TODO (backend):
            const res = await fetch('/historico');
            sessions = await res.json();
        */

        // Dados de exemplo
        sessions = [
            {
                id: 'exemplo-1',
                title: 'Aula de quarta-feira',
                date: '06/03/2025',
                messages: [
                    { who: 'user', text: 'o que tem na quarta?', time: '19:02' },
                    { who: 'bot',  text: 'Tem uma aula do balacobaco de INTRODUÇÃO À ENGENHARIA DE SOLUÇÕES com o professor HENRIQUE LIMA. Começa às 19:00 e termina às 22:40. Local é BLOCO H, SALA 110 📚', source: 'regras', time: '19:02' }
                ]
            },
            {
                id: 'exemplo-2',
                title: 'Teste do sistema',
                date: '05/03/2025',
                messages: [
                    { who: 'user', text: 'qual o seu nome?', time: '20:15' },
                    { who: 'bot',  text: 'Meu nome é Lionel No IT 😉', source: 'regras', time: '20:15' }
                ]
            }
        ];

        renderSidebar();
    }

    async function saveCurrentSession(messages) {
        if (!activeId || messages.length === 0) return;

        const firstUserMsg = messages.find(m => m.who === 'user');
        const title = firstUserMsg
            ? firstUserMsg.text.slice(0, 30) + (firstUserMsg.text.length > 30 ? '…' : '')
            : 'Conversa';

        const today    = new Date().toLocaleDateString('pt-BR');
        const existing = sessions.findIndex(s => s.id === activeId);
        const session  = { id: activeId, title, date: today, messages };

        if (existing >= 0) sessions[existing] = session;
        else sessions.unshift(session);

        /* TODO (backend):
            await fetch('/historico', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(session)
            });
        */

        renderSidebar();
    }

    // ════════════════════════════════════════
    // SIDEBAR DE HISTÓRICO
    // ════════════════════════════════════════
    function renderSidebar() {
        const list = document.getElementById('historyList');

        if (sessions.length === 0) {
            list.innerHTML = `<div class="history-empty">Nenhuma conversa ainda.<br>Manda uma mensagem! 👀</div>`;
            return;
        }

        const groups = {};
        sessions.forEach(s => {
            const key = s.date || 'Sem data';
            if (!groups[key]) groups[key] = [];
            groups[key].push(s);
        });

        list.innerHTML = '';
        Object.entries(groups).forEach(([date, items]) => {
            const label = document.createElement('div');
            label.className = 'history-section-label';
            label.textContent = date;
            list.appendChild(label);

            items.forEach(s => {
                const item = document.createElement('div');
                item.className = 'history-item' + (s.id === activeId ? ' active' : '');
                item.innerHTML = `
                    <div class="history-item-title">${escHtml(s.title)}</div>
                    <div class="history-item-meta">${s.messages.length} mensagem(s)</div>
                `;
                item.onclick = () => openSession(s.id);
                list.appendChild(item);
            });
        });
    }

    function toggleSidebar() {
        document.getElementById('chatSidebar').classList.toggle('collapsed');
    }

    // ════════════════════════════════════════
    // SESSÕES
    // ════════════════════════════════════════
    function newChat() {
        activeId        = 'sess-' + Date.now();
        currentMessages = [];

        const chatbox = document.getElementById('chatbox');
        chatbox.innerHTML = `
            <div class="separator">hoje</div>
            <div class="message-row">
                <div class="msg-avatar">🤖</div>
                <div>
                    <div class="message bot-message">Olá! Como posso ajudar hoje? 👀</div>
                    <div class="msg-meta"><span class="msg-time">${now()}</span></div>
                </div>
            </div>
        `;

        document.getElementById('chatTitle').textContent = 'Nova conversa';
        document.getElementById('userInput').focus();
        renderSidebar();
    }

    function openSession(id) {
        const session = sessions.find(s => s.id === id);
        if (!session) return;

        activeId        = id;
        currentMessages = [...session.messages];

        const chatbox = document.getElementById('chatbox');
        chatbox.innerHTML = `<div class="separator">${session.date}</div>`;

        session.messages.forEach(m => renderMessage(m.who, m.text, m.source, m.time));

        document.getElementById('chatTitle').textContent = session.title;
        chatbox.scrollTop = chatbox.scrollHeight;
        renderSidebar();
    }

    // ════════════════════════════════════════
    // ENVIO — conecta ao /chat do seu backend
    // ════════════════════════════════════════
    async function sendMessage() {
        const userInput = document.getElementById('userInput');
        const chatbox   = document.getElementById('chatbox');
        const sendBtn   = document.getElementById('sendBtn');
        const text      = userInput.value.trim();
        if (!text) return;

        if (!activeId) activeId = 'sess-' + Date.now();

        const userTime = now();
        renderMessage('user', text, null, userTime);
        currentMessages.push({ who: 'user', text, time: userTime });

        userInput.value  = '';
        sendBtn.disabled = true;

        // Typing indicator
        const typingRow = document.createElement('div');
        typingRow.classList.add('typing-row');
        typingRow.id = 'typing';
        typingRow.innerHTML = `
            <div class="msg-avatar">🤖</div>
            <div class="typing-bubble"><span></span><span></span><span></span></div>
        `;
        chatbox.appendChild(typingRow);
        chatbox.scrollTop = chatbox.scrollHeight;

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensagem: text })
            });

            let data = {};
            try {
                data = await res.json();
                console.log("Resposta do servidor:", data);
            } catch { data = {}; }

            document.getElementById('typing')?.remove();

            const respostaSegura = (typeof data.response?.resposta === 'string' && data.response.resposta.trim())
                ? data.response.resposta
                : (typeof data.erro === 'string' && data.erro.trim())
                    ? `⚠️ ${data.erro}`
                    : '⚠️ Não consegui entender a resposta do servidor.';

            const sourceSegura = typeof data.source === 'string' ? data.source : null;
            const botTime      = now();

            renderMessage('bot', respostaSegura, sourceSegura, botTime);
            currentMessages.push({ who: 'bot', text: respostaSegura, source: sourceSegura, time: botTime });

            await saveCurrentSession(currentMessages);

        } catch {
            document.getElementById('typing')?.remove();
            renderMessage('bot', '⚠️ Servidor offline. Certifique-se que o app.py está rodando.', null, now());
        }

        sendBtn.disabled  = false;
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    // ════════════════════════════════════════
    // RENDER
    // ════════════════════════════════════════
    function renderMessage(who, text, source, time) {
        const chatbox  = document.getElementById('chatbox');
        const row      = document.createElement('div');
        row.classList.add('message-row');
        if (who === 'user') row.classList.add('user');

        const icon     = who === 'user' ? '🧑' : '🤖';
        const msgClass = who === 'user' ? 'user-message' : 'bot-message';
        const badge    = (source && source !== 'regras' && source !== 'fallback')
            ? `<span class="source-tag">${escHtml(source)}</span>` : '';

        // Bot já retorna HTML (markdown convertido pela API) — exibe direto
        // Usuário: escapa para evitar injeção
        const conteudo = who === 'bot' ? text : escHtml(text);

        row.innerHTML = `
            <div class="msg-avatar">${icon}</div>
            <div>
                <div class="message ${msgClass}">${conteudo}</div>
                <div class="msg-meta">
                    ${badge}
                    <span class="msg-time">${time || now()}</span>
                </div>
            </div>
        `;
        chatbox.appendChild(row);
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    // ════════════════════════════════════════
    // HELPERS
    // ════════════════════════════════════════
    function now() {
        return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    document.getElementById('userInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
    });
</script>
</body>
</html>

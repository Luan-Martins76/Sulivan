<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sulivan.IA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="icon" sizes="32x32" href="{{ url_for('static', filename='favicon_io/favicon-32x32.png') }}">
    <link rel="icon" sizes="16x16" href="{{ url_for('static', filename='favicon_io/favicon-16x16S.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon_io/apple-touch-icon.png') }}"> 
    <style href="{{ url_for('static', filename='css/index.css') }}"></style>
</head>
<body>

  <!-- ── Views ──────────────────────────────────────── -->
  <main class="main-content">

    <section id="view-home" class="view-section active" aria-labelledby="home-title">
      <iframe
        src="{{ url_for('static', filename='front_secundarios/home.html') }}"
        style="position:absolute; inset:0; width:100%; height:100%; border:none; z-index:0;">
      </iframe>
    </section>

    <section id="view-login" class="view-section" aria-label="Área de login">
    <iframe
        src="{{ url_for('static', filename='rede/index.html') }}"
        style="position:absolute; inset:0; width:100%; height:100%; border:none; z-index:0;">
      </iframe> 
    </section>

    <section id="view-chat" class="view-section" aria-label="Área de Chat">
      <iframe
        src="{{ url_for('static', filename='front_secundarios/chat.html') }}"
        style="position:absolute; inset:0; width:100%; height:100%; border:none; z-index:0;">
      </iframe>
    </section>

    <section id="view-section-banner" class="view-section" aria-label="Calendário — Universo">
      <iframe
        src="{{ url_for('static', filename='front_secundarios/calendario.html') }}"
        style="position:absolute; inset:0; width:100%; height:100%; border:none; z-index:0;">
      </iframe>
    </section>

    <section id="view-AVA" class="view-section" aria-label="AVA - UNI">
      <iframe
        src="https://www4.unievangelica.edu.br"
        style="position:absolute; inset:0; width:100%; height:100%; border:none; z-index:0;">
      </iframe>
    </section>

    <section id="view-tarefas" class="view-section" aria-label="AVA - UNI">
          <iframe
            src="{{ url_for('static', filename='fucusapk/index.html') }}"
            style="position:absolute; inset:0; width:100%; height:100%; border:none; z-index:0;">
          </iframe>
        </section>    

  </main>

  <!-- ── Dock ──────────────────────────────────────────── -->
  <nav class="dock-wrapper" aria-label="Navegação principal">
    <div class="dock-inner">
      <ul class="dock-list">

          
        
        <li class="icon-content">
          <span class="tooltip">Início</span>
          <a href="#home" data-view="home"
             onclick="app.switchView('home', this); return false;">
            <div class="filled"></div>
            <span class="icon-glyph">🏠</span>
          </a>
        </li>

        <li class="icon-content">
          <span class="tooltip">Calendário</span>
          <a href="#calendario" data-view="section-banner"
             onclick="app.switchView('section-banner', this); return false;">
            <div class="filled"></div>
            <span class="icon-glyph">📅</span>
          </a>
        </li>

        <li class="icon-content">
          <span class="tooltip">Tarefas</span>
          <a href="#tarefas" data-view="tarefas"
             onclick="app.switchView('tarefas', this); return false;">
            <div class="filled"></div>
            <span class="icon-glyph">📝</span>
          </a>
        </li>

        <li class="icon-content">
          <span class="tooltip">Chat</span>
          <a href="#chat" data-view="chat"
             onclick="app.switchView('chat', this); return false;">
            <div class="filled"></div>
            <span class="icon-glyph">🤖</span>
          </a>
        </li>

      

      <li class="icon-content">
        <span class="tooltip">UniEvangélica</span>
        <a href="#AVA" data-view="AVA"
            onclick="app.switchView('AVA', this); return false;">
          <div class="filled"></div>
          <span class="icon-glyph">🚀</span>
        </a>
      </li>                
      </ul>
      <div class="dock-divider" aria-hidden="true"></div>

      <ul class="dock-list">

        <li class="icon-content">
          <span class="tooltip">Configurações</span>
          <a href="#config" data-view="config">
            <div class="filled"></div>
            <span class="icon-glyph">⚙️</span>
          </a>
        </li>

        <li class="icon-content">
          <span class="tooltip">Perfil</span>
          <a href="#perfil" data-view="login"
             onclick="app.switchView('login', this); return false;">
            <div class="filled"></div>
            <span class="icon-glyph">👤</span>
          </a>
        </li>

        <li class="icon-content">
          <span class="tooltip">Sair</span>
          <a href="#sair" data-view="sair">
            <div class="filled"></div>
            <span class="icon-glyph">📤</span>
          </a>
        </li>

        
      </ul>
    </div>
  </nav>

  <!-- ── Scripts ────────────────────────────────────────── -->
  <script src="{{ url_for('static', filename='js/index.js') }}"></script>

</body>
</html>

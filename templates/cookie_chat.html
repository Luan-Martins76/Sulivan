<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
<meta name="viewport" content="width=240"/>
<title>Sulivan IA</title>
<style type="text/css">
body{background:#000;color:#00ff00;font-family:Arial;font-size:11px;margin:4px;}
h1{color:#00ffff;font-size:13px;text-align:center;margin:2px;}
textarea{width:95%;background:#000;color:#00ff00;border:1px solid #00ff00;font-size:11px;}
input[type=submit]{background:#000;color:#00ffff;border:1px solid #00ffff;font-size:11px;margin-top:4px;}
.msg{border:1px solid #00ff00;padding:3px;margin:3px 0;}
.resp{border:1px solid #00ffff;padding:3px;margin:3px 0;color:#00ffff;}
.err{color:#ff0000;}
hr{border:1px solid #00ff00;}
</style>
<script type="text/javascript">
function enviar(){
  var msg = document.getElementById("msg").value;
  if(!msg) return;

  document.getElementById("resultado").innerHTML = "<p style='color:#ffff00'>Pensando...</p>";

  var xhr;
  if(window.XMLHttpRequest){
    xhr = new XMLHttpRequest();
  } else {
    xhr = new ActiveXObject("Microsoft.XMLHTTP");
  }

  xhr.onreadystatechange = function(){
    if(xhr.readyState == 4){
      if(xhr.status == 200){
        var data = eval("(" + xhr.responseText + ")");
        document.getElementById("resultado").innerHTML =
          "<div class='msg'><b>Voce:</b><br/>" + msg + "</div>" +
          "<div class='resp'><b>IA:</b><br/>" + data.response + "</div>";
      } else {
        document.getElementById("resultado").innerHTML =
          "<p class='err'>Erro: " + xhr.status + "</p>";
      }
    }
  };

  xhr.open("POST", "/chat", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.send('{"mensagem":"' + msg.replace(/"/g,'\\"') + '"}');
}
</script>
</head>
<body>

<h1>*** SULIVAN IA ***</h1>
<h1>Cookie Smart Edition</h1>
<hr/>

<div class="msg">
<b>Mensagem:</b><br/>
<textarea id="msg" rows="3" cols="26"></textarea><br/>
<input type="submit" value="Enviar" onclick="enviar()"/>
</div>

<hr/>
<div id="resultado">
<p style="color:#555555">Aguardando mensagem...</p>
</div>

<hr/>
<p style="color:#ff6600;font-size:10px;">Sulivan v0.1 Cookie Edition<br/>Tecnologia de ponta em 240x320px</p>

</body>
</html>
